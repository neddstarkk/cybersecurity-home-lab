title: Potential Credential Dumping via LSASS Memory Access
id: custom-rule-001
status: test
description: Detects process access to LSASS with suspicious granted access masks and call traces indicating credential dumping tools such as comsvcs.dll, ProcDump, or Mimikatz.
author: Nedheesh Hasija
date: 2026/06/17
tags:
    - attack.credential_access
    - attack.t1003.001
logsource:
    category: process_access
    product: windows
detection:
    selection:
        TargetImage|endswith: '\lsass.exe'
        GrantedAccess|contains:
            - '0x1038'
            - '0x1438'
            - '0x143a'
            - '0x1fffff'
        CallTrace|contains:
            - 'dbgcore.dll'
            - 'dbghelp.dll'
            - 'ntdll.dll'
            - 'kernelbase.dll'
    filter_system:
        SourceImage|endswith:
            - '\svchost.exe'
            - '\csrss.exe'
            - '\wininit.exe'
            - '\lsass.exe'
    condition: selection and not filter_system
falsepositives:
    - Security scanning tools
    - Antivirus software performing memory inspection
level: high